name: 全球總經戰情室 - 每日晨間自動更新 (Daily Update)

# 2026-04-16 強制喚醒排程伺服器
on:
  schedule:
    # 為了避免 GitHub 整點大塞車導致遲遲未執行，提早至 UTC 的 22:13 (台灣時間 6:13 進入排隊)
    - cron: '13 22 * * *'
  # 允許我們在 GitHub 網頁上按鈕「手動觸發」測試
  workflow_dispatch:

# 授權設定：確保機器人有推送程式碼與發布 GitHub Pages 的權限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 下載最新版程式碼 (Checkout Repo)
        uses: actions/checkout@v4
        
      - name: 🐍 準備 Python 環境 (Setup Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 安裝必要套件與系統依賴 (Install dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          pip install google-generativeai pandas edge-tts pillow
          
      - name: 🧠 呼叫 AI 生成今日戰情報告 (Run AI Dashboard Generation)
        env:
          # 最高機密！從 GitHub 保險箱中拿出 Gemini API Key
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python update_dashboard.py
          
      - name: 🎥 自動產製每週總經影音 (僅週四執行)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TW_DAY=$(TZ='Asia/Taipei' date +%u)
          if [ "$TW_DAY" -eq 4 ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "今天是週四（或手動觸發），開始產製雙主播回顧影片..."
            python generate_weekly_video.py
          else
            echo "今天不是週四 (星期 $TW_DAY)，跳過影片產製，僅保留每日 Podcast。"
          fi
          
      - name: 📦 上傳網頁產物 (Upload Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: 🔍 檢查檔案狀態 (Debug Listing)
        run: |
          echo "當前目錄檔案列表："
          ls -a
          
      - name: 💾 儲存並推送到 GitHub (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html macro_analysis.csv historical_data.json
          git add generate_weekly_video.py tom.png miranda.png 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Dashboard generated on $(date +'%Y-%m-%d %H:%M')" && git push)
          
  # 新的部署任務：直接發布到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: run-and-deploy
    permissions:
      pages: write
      id-token: write
    steps:
      - name: 🚀 最終部署到 GitHub Pages (Direct Deploy)
        id: deployment
        uses: actions/deploy-pages@v4
